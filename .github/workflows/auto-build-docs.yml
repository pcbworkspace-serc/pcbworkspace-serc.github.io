name: Auto Build Docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WELCOME_EMAIL_WEBHOOK_URL: ${{ secrets.VITE_WELCOME_EMAIL_WEBHOOK_URL }}
          VITE_PCB_WORKSPACE_ACCESS_VIDEO_URL: ${{ vars.VITE_PCB_WORKSPACE_ACCESS_VIDEO_URL }}
          VITE_SUPPORT_EMAIL: ${{ vars.VITE_SUPPORT_EMAIL }}

      - name: Commit updated docs
        run: |
          if [ -n "$(git status --porcelain docs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs
            git commit -m "chore: update docs [skip ci]"
            git push
          else
            echo "No docs changes to commit"
          fi